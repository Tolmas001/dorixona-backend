version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dorixona_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dorixona_db}
      POSTGRES_USER: ${POSTGRES_USER:-urinovtolmas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5433}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-urinovtolmas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
